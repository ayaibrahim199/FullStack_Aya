spring.application.name=SmartAppointmentBookingSystem
server.port=8080

# --- DATABASE CONFIGURATION (H2 File-Based - DATA PERSISTS!) ---
# Database will be saved to: ~/appointment-booking-db
spring.datasource.url=jdbc:h2:file:~/appointment-booking-db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# --- JPA / Hibernate Settings ---
# Changed from 'create-drop' to 'update' so data persists!
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# H2 Console for viewing database (optional)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- SECURITY / JWT ---
# Use consistent names that match your JwtUtils.java
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
# 1 day in milliseconds
jwt.expiration=86400000